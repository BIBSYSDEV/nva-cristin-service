[versions]
apache-http-core5 = { strictly = '5.4.1' }
awsLambdaCore = { strictly = '1.4.0' }
awsSdk2 = { strictly = '2.42.5' }
bekkopen-nocommons = { strictly = '0.16.0' }
com-auth0-jwks = { strictly = '0.23.0' }
com-auth0-jwt = { strictly = '4.5.1' }
guava = { strictly = '33.5.0-jre' }
hamcrest = { strictly = '3.0' }
jackson = { strictly = '2.21.1' }
jackson-annotations = { strictly = '2.21' }
json-assert = { strictly = '1.5.3' }
jupiter = { strictly = '5.14.2' }
karate-core = { strictly = '1.3.1' }
karate-junit5 = { strictly = '1.3.1' }
log4j = { strictly = '2.25.3' }
mockito = { strictly = '5.22.0' }
nva-commons = { strictly = '2.5.9' }
nva-language = { strictly = '1.2.1' }
